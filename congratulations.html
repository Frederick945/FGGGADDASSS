<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caelifera 3031</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            padding: 50px;
            font-family: 'Share Tech Mono', monospace;
            line-height: 1.8;
            color: white;
            background: black;
        }

        /* Imagen fija detrás del texto */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Caelifeira.png'); /* Tu imagen local */
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.4); /* Opcional para que el texto resalte */
        }

        .text {
            max-width: 600px;
            font-size: 1.3em;
            white-space: pre-wrap; /* <- Aquí se respetan espacios y saltos de línea */
        }

        .signature {
            margin-top: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="background-image"></div>

    <div class="text">
Hello.

Congratulations, you’ve completed it—you’ve solved all the riddles, and if you made it this far, my sincere congratulations. But this is not the end; it’s only the beginning.

See you later!
<span class="signature">3031</span>
    </div>
</body>
</html>
